<script>

let shuffled = [];
let cur = 0;
let pts = 0;
let results = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function restart() {
  shuffled = shuffle(QUESTIONS);
  cur = 0; pts = 0; results = [];
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = shuffled[cur];
  const total = shuffled.length;
  document.getElementById('t-prog').textContent = 'Question ' + (cur+1) + ' / ' + total;
  document.getElementById('t-sc').textContent = pts + ' pt' + (pts>1?'s':'');
  document.getElementById('t-pfill').style.width = Math.round((cur/total)*100) + '%';
  const badge = document.getElementById('t-badge');
  badge.textContent = q.badge;
  badge.style.background = q.badgeColor;
  badge.style.color = q.badgeText;
  document.getElementById('t-q').textContent = q.q;
  const scBox = document.getElementById('t-sc-box');
  if (q.scenario) { scBox.textContent = q.scenario; scBox.style.display = 'block'; }
  else scBox.style.display = 'none';
  const fb = document.getElementById('t-fb');
  fb.className = 't-fb'; fb.textContent = '';
  document.getElementById('t-next-btn').style.display = 'none';
  const area = document.getElementById('t-opts-area');
  if (q.type === 'vf') {
    area.innerHTML = `<div class="t-tf-opts">
      <button class="t-tf-btn" onclick="answerVF(true)">Vrai</button>
      <button class="t-tf-btn" onclick="answerVF(false)">Faux</button>
    </div>`;
  } else {
    area.innerHTML = '<div class="t-opts">' + q.opts.map((o,i) =>
      `<button class="t-opt" onclick="answerQCM(${i})">${o}</button>`
    ).join('') + '</div>';
  }
}

function reveal(correct, exp) {
  const fb = document.getElementById('t-fb');
  fb.textContent = (correct ? '✓ Correct — ' : '✗ Incorrect — ') + exp;
  fb.className = 't-fb show ' + (correct ? 'ok' : 'ko');
  document.getElementById('t-next-btn').style.display = '';
  results.push({ q: shuffled[cur].badge, ok: correct });
  if (correct) pts++;
  document.getElementById('t-sc').textContent = pts + ' pt' + (pts>1?'s':'');
}

function answerQCM(i) {
  const q = shuffled[cur];
  document.querySelectorAll('.t-opt').forEach((b,j) => {
    b.classList.add(j === q.ans ? 'ok' : (j === i && i !== q.ans ? 'ko' : 'neutral'));
  });
  reveal(i === q.ans, q.exp);
}

function answerVF(val) {
  const q = shuffled[cur];
  const correct = val === q.ans;
  document.querySelectorAll('.t-tf-btn').forEach(b => {
    const bval = b.textContent === 'Vrai';
    b.classList.add(bval === q.ans ? 'ok' : (bval === val && !correct ? 'ko' : 'neutral'));
  });
  reveal(correct, q.exp);
}

function nextQ() {
  cur++;
  if (cur >= shuffled.length) { showResult(); return; }
  renderQ();
}

function showResult() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  const total = shuffled.length;
  const pct = Math.round((pts/total)*100);
  document.getElementById('r-num').textContent = pts + '/' + total;
  document.getElementById('r-sub').textContent = pct + '% de bonnes réponses';
  const v = document.getElementById('r-verdict');
  if (pct >= 83) { v.textContent = 'Excellent — tu maîtrises le cours'; v.style.background='#E1F5EE'; v.style.color='#085041'; }
  else if (pct >= 58) { v.textContent = 'Bien — quelques points à consolider'; v.style.background='#FAEEDA'; v.style.color='#633806'; }
  else { v.textContent = 'À retravailler — revois les fondamentaux'; v.style.background='#FCEBEB'; v.style.color='#791F1F'; }
  const cats = {};
  results.forEach(r => { if (!cats[r.q]) cats[r.q]={ok:0,total:0}; cats[r.q].total++; if(r.ok) cats[r.q].ok++; });
  document.getElementById('r-breakdown').innerHTML = Object.entries(cats).map(([cat,v]) =>
    `<div class="r-row"><span class="r-cat">${cat}</span><span class="r-mark ${v.ok===v.total?'ok':'ko'}">${v.ok}/${v.total}</span></div>`
  ).join('');
}

restart();
</script>
